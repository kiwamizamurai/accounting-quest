<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="The Accounting Quest - Learn accounting through an epic pixel art RPG adventure">
  <meta name="theme-color" content="#1a1a2e">
  <title>The Accounting Quest - 会計の冒険</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    #game-container {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: none;
    }
    canvas:focus {
      outline: none;
    }
    /* Loading screen */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffd700;
      font-size: 24px;
      text-align: center;
    }
    #loading.hidden {
      display: none;
    }
    .loading-dots::after {
      content: '.';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60% { content: '...'; }
      80%, 100% { content: ''; }
    }
  </style>
  <script type="module" crossorigin src="/accounting-quest/assets/index-4tgEVlz8.js"></script>
  <link rel="modulepreload" crossorigin href="/accounting-quest/assets/phaser-DFK5Ua9d.js">
</head>
<body>
  <div id="loading">
    <div>The Accounting Quest</div>
    <div>Loading<span class="loading-dots"></span></div>
  </div>
  <div id="game-container"></div>
</body>
</html>
